apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: master
  namespace: default
spec:
  ingressClassName: nginx
  rules:
# TODO: We have disabled the host for now
{{/*    - host: test.axile.nucleon-forge.com*/}}
    - http:
        paths:
          - backend:
              service:
                name: master
                port:
                  number: 8080
            path: /api
            pathType: Prefix
          - backend:
              service:
                name: front-end
                port:
                  number: 8080
            path: /
            pathType: Prefix
