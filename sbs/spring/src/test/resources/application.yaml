spring:
  info:
    git:
      location: classpath:other/git.properties
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - axile-metadata
          - property-management
          - cache-dispatcher
          - profile-management
          - beans
          - env
          - axile-env
          - axile-metrics
          - configprops
          - axile-configprops

logging:
  level:
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR