spring:
  application:
    name: axelix
  mvc:
    servlet:
      path: /api/${spring.application.name}
  config:
    import: "classpath:tokens.yml"

axelix:
  config:
    auth:
      tables:
        user-table: users
        role-table: roles
        authority-table: authorities
        user-role-table: user_roles
        role-authority-table: role_authorities
        role-components-table: role_components
  master:
    auth:
      jwt:
        algorithm: "HMAC512"
        signing_key: "22573444698685aa77750b88ad6e99ef1f94a7a909bc7df63f7a80666208c201ab7a584e6e05e6c9d0aa94b723f843ff"
        lifespan: 3h
      type: static-admin
      static-admin:
        credentials:
          password: admin
          username: admin
      cookie:
        name: auth_token
        secure: false
